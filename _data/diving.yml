- name: Iriomote
  location: Okinawa, Japan
  date: Oct 2023
  lat: 24.3878
  lng: 123.8439
  notes: Remote island reefs with healthy coral and abundant small marine life.

- name: Izu
  location: Shizuoka, Japan
  lat: 34.9730
  lng: 138.7800
