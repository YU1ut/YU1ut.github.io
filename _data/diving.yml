# Add one item per dive site.
# Required for map marker: `lat`, `lng`
# Optional fields: `date`, `notes`
#
# Example:
# - name: Blue Corner
#   location: Palau
#   date: 2024-08
#   lat: 7.2471
#   lng: 134.3649
#   notes: Strong current drift dive with reef sharks.
- name: Moalboal
  location: Cebu, Philippines
  date: May 2026
  lat: 9.9433
  lng: 123.3992
  notes: Famous for the sardine run, easy reef access, and frequent turtle encounters.

- name: Malapascua
  location: Daanbantayan, Cebu, Philippines
  date: May 2026
  lat: 11.3270
  lng: 124.1124
  notes: Best known for early-morning thresher shark dives, plus walls and nearby island sites.

- name: Sumilon
  location: Oslob, Cebu, Philippines
  date: May 2026
  lat: 9.4328
  lng: 123.3908
  notes: Clear-water drift dives with steep walls, sharks, strong fish life, and healthy coral.

- name: Waikiki
  location: Oahu, Hawaii, USA
  date: Oct 2025
  lat: 21.2767
  lng: -157.8294
  notes: Reef and wreck dives with tropical fish, plus Hawaiian green sea turtles.

- name: Cozumel
  location: Quintana Roo, Mexico
  date: Aug 2025
  lat: 20.4220
  lng: -86.9223
  notes: Fast drift dives along healthy walls with clear visibility and frequent turtle sightings.

- name: Dos Ojos
  location: Tulum, Quintana Roo, Mexico
  date: Aug 2025
  lat: 20.3315
  lng: -87.3972
  notes: Cenote cavern dive with dramatic light beams, halocline layers, and crystal-clear water.

- name: Kona
  location: Hawaii, USA
  lat: 19.6406
  lng: -155.9969
  notes: Volcanic reef dives and memorable night dives with manta rays.

- name: Palau
  location: Koror, Palau
  date: Nov. 2023
  lat: 7.3426
  lng: 134.4789
  notes: Current-rich sites with dramatic walls, sharks, and dense schooling fish.

- name: Okinawa
  location: Okinawa, Japan
  lat: 26.2124
  lng: 127.6809
  notes: Warm blue water and coral-garden dives with relaxed conditions.

- name: Miyako
  location: Okinawa, Japan
  date: Sep 2022
  lat: 24.8056
  lng: 125.2811
