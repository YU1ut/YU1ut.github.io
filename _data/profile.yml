short_bio: >-
  <p>Hi, my name is Qing YU. I am currently a research scientist at <a href="https://research.lycorp.co.jp/en" target="_blank">LY Corporation</a>.</p>
  <p>I am a member of the Virtual Human Lab at LY Corp. I was previously a member of <a href="https://www.hal.t.u-tokyo.ac.jp/" target="_blank">Aizawa Laboratory</a> and worked with Prof. Kiyoharu Aizawa. My research interests include computer vision and generative AI, particularly image, video, and motion generation.</p>
  <p>I was a recipient of JSPS Research Fellowships for Young Scientists (DC1, 2020-2023) and The University of Tokyo Fellowship (2018-2020).</p>

